# ============================================================
# AES Customer Portal — Application Properties
# ============================================================

# Server
server.port=8080
spring.application.name=aes-backend

# ============================================================
# Database — PostgreSQL 16
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/aes_db
spring.datasource.username=aes_user
spring.datasource.password=aes_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway Migrations
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=aes-customer-portal-256bit-secret-key-2024-secure-random-value
jwt.access-token-expiry=900
jwt.refresh-token-expiry=604800

# ============================================================
# Twilio SMS
# ============================================================
twilio.account-sid=ACxxxxx
twilio.auth-token=xxxxx
twilio.from-number=+1XXXXXXXXXX

# ============================================================
# App Configuration
# ============================================================
app.escalation.l1-timeout-minutes=30
app.escalation.l2-timeout-minutes=60

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:3000

# ============================================================
# Logging
# ============================================================
logging.level.com.aes=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO

# ============================================================
# SpringDoc OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
