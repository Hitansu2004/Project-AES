# ============================================================
# AES Customer Portal — Common Application Properties
# Active profile is selected via SPRING_PROFILES_ACTIVE
# (defaults to "dev" via application-dev.properties).
# ============================================================

# ─── Server ────────────────────────────────────────────────
server.port=8080
spring.application.name=aes-backend
spring.profiles.active=dev

# ─── Database (PostgreSQL 16) ──────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/aes_db
spring.datasource.username=aes_user
spring.datasource.password=aes_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
# SQL printing is OFF by default; toggle it on with `app.log-sql=true` only
# when you genuinely need to inspect a query (see RequestLoggingFilter for
# the per-request access log we use instead).
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# The dialect is auto-detected from the JDBC driver — explicitly setting it
# triggers HHH90000025 on Hibernate 6.x.
spring.jpa.open-in-view=false

# ─── Flyway Migrations ─────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT (Section 7, lines 1680-1684) ──────────────────────
jwt.secret=${JWT_SECRET:aes-customer-portal-256bit-secret-key-2024-secure-random-value}
jwt.access-token-expiry=900
jwt.refresh-token-expiry=604800

# ─── Twilio SMS (Section 4.1 + 14, lines 1947-1949 / 2072) ─
# Demo builds log the OTP only; real Twilio credentials activate live SMS.
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# ─── App Configuration (Section 6 + 10) ────────────────────
# Demo mode is overridden per-profile (dev=true, prod=false).
app.demo-mode=false
app.demo-otp-bypass=
app.escalation.l1-timeout-minutes=30
app.escalation.l2-timeout-minutes=60

# Workflow re-design (PLAN.md / FLOW.md)
# Default OFF so Phase 1 is non-breaking. Flip to true once the Ops
# Manager triage dashboard (Phase 2) is live.
app.workflow.ops-triage-enabled=false

# Assignment-offer windows (Ops -> CRM, CRM -> Engineer).
app.offer.crm-expiry-minutes=15
app.offer.engineer-expiry-minutes=10

# New SLA ladder — L2 SLA breach should NOT auto-transfer to admin; it
# just raises an alert on the admin dashboard. Set to false to fall
# back to the legacy auto-bump behaviour.
app.escalation.l3-monitor-only=true

# ─── CORS ──────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── Logging ───────────────────────────────────────────────
# Patterns + framework levels live in logback-spring.xml so we keep one source
# of truth. These keys only nudge our own packages.
logging.level.com.aes=INFO
logging.level.com.aes.config.RequestLoggingFilter=INFO

# ─── SpringDoc OpenAPI ─────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
