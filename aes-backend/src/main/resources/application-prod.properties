# ============================================================
# AES Customer Portal — PROD Profile
# Hardened defaults: no demo OTPs, no SQL log, no Swagger UI.
# ============================================================

# Logging — frameworks already silenced via logback-spring.xml; only our
# own packages are kept at INFO so request logs and warnings show up.
logging.level.com.aes=INFO

# Production safety — never expose OTPs over the API.
app.demo-mode=false
app.demo-otp-bypass=

# Production escalation timeouts (Section 6).
app.escalation.l1-timeout-minutes=30
app.escalation.l2-timeout-minutes=60
# SLA enforcement runs every 30s in production.
app.escalation.auto-enabled=true

# Disable Swagger UI in production.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
