# ============================================================
# AES Customer Portal — PROD Profile
# Hardened defaults: no demo OTPs, no SQL log, no Swagger UI.
# ============================================================

spring.jpa.show-sql=false
logging.level.com.aes=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Production safety — never expose OTPs over the API.
app.demo-mode=false
app.demo-otp-bypass=

# Production escalation timeouts (Section 6).
app.escalation.l1-timeout-minutes=30
app.escalation.l2-timeout-minutes=60

# Disable Swagger UI in production.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
