# ============================================================
# AES Customer Portal — DEV Profile
# Verbose logs + demo-friendly OTP behaviour.
# ============================================================

spring.jpa.show-sql=true
logging.level.com.aes=DEBUG
logging.level.org.springframework.security=DEBUG

# Demo mode (Section 11, lines 1960-1990):
#   - Returns generated OTP in the API response so the demo can be driven
#     without an SMS gateway.
#   - Honours the universal "000000" bypass code per spec line 2013.
app.demo-mode=true
app.demo-otp-bypass=000000

# Optional: shrink the L1 timeout to 2 minutes for the live demo escalation
# walk-through described in Section 11 (line 1979). Uncomment for the demo.
# app.escalation.l1-timeout-minutes=2
