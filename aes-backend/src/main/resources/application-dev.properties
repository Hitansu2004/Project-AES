# ============================================================
# AES Customer Portal — DEV Profile
#
# Logs are kept clean: the per-request access log (see
# RequestLoggingFilter) is the primary trace, framework noise
# is silenced by logback-spring.xml.
#
# To inspect raw Hibernate SQL for a single debug session, run with
# JVM arg `-Dlogging.level.org.hibernate.SQL=DEBUG` — do NOT enable
# it permanently in this file or the console will be unreadable.
# ============================================================

# Per-package log levels for our own code while developing
logging.level.com.aes=DEBUG

# Demo mode (Section 11, lines 1960-1990):
#   - Returns generated OTP in the API response so the demo can be driven
#     without an SMS gateway.
#   - Honours the universal "000000" bypass code per spec line 2013.
app.demo-mode=true
app.demo-otp-bypass=000000

# Optional: shrink the L1 timeout to 2 minutes for the live demo escalation
# walk-through described in Section 11 (line 1979). Uncomment for the demo.
# app.escalation.l1-timeout-minutes=2

# The auto-escalation engine is OFF in dev/demo so the V4 seed data keeps the
# tickets at their authored levels (1102 at L1, 1103 at L2, 1106 at L3, etc).
# Walk through escalations manually via the CRM/Admin UI buttons; flip this to
# true (or unset it) if you want to demo the SLA breach loop end-to-end.
app.escalation.auto-enabled=false

# Phase 2 — Ops Manager triage enabled in dev so all new tickets / installs
# land in Meera's inbox first instead of round-robin to a sleeping CRM.
app.workflow.ops-triage-enabled=true
