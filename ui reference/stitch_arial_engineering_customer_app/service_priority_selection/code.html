<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Service Request Type Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#e5efff",
                        "primary-fixed": "#d5e3ff",
                        "primary-container": "#003366",
                        "on-tertiary-fixed": "#2c0050",
                        "on-primary-fixed-variant": "#1f477b",
                        "primary-fixed-dim": "#a7c8ff",

                        "secondary-fixed-dim": "#78d1ff",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#c07dff",
                        "tertiary-container": "#4e0086",
                        "inverse-on-surface": "#e9f1ff",
                        "inverse-primary": "#a7c8ff",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#6712aa",
                        "tertiary": "#300056",
                        "on-surface": "#0f1c2c",
                        "outline": "#737780",
                        "outline-variant": "#c3c6d1",
                        "surface-tint": "#3a5f94",
                        "on-primary-fixed": "#001b3c",
                        "on-surface-variant": "#43474f",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#cddbf0",
                        "surface-container-high": "#dbe9fe",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#005371",
                        "secondary": "#006689",
                        "surface-container-low": "#eef4ff",
                        "surface": "#f8f9ff",
                        "tertiary-fixed-dim": "#deb7ff",
                        "surface-variant": "#d6e4f9",
                        "on-primary-container": "#799dd6",
                        "on-secondary-fixed": "#001e2c",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#d6e4f9",
                        "on-background": "#0f1c2c",
                        "surface-bright": "#f8f9ff",
                        "secondary-fixed": "#c3e8ff",
                        "inverse-surface": "#243141",
                        "tertiary-fixed": "#f0dbff",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "margin-mobile": "20px",
                        "stack-sm": "8px",
                        "stack-lg": "24px",
                        "stack-md": "16px",
                        "margin-desktop": "40px",
                        "gutter": "16px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],

                        "headline-md": ["Inter"],

                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"]

                    "fontSize": {

                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff; /* theme('colors.surface') */
            color: #0f1c2c; /* theme('colors.on-surface') */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface antialiased pb-[92px]"> <!-- Added pb for bottom nav -->
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile h-14 bg-surface dark:bg-on-surface border-b border-outline-variant dark:border-outline shadow-sm docked full-width top-0 sticky z-50">
<button class="text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm-mobile text-headline-sm-mobile font-bold text-primary dark:text-primary-fixed">Service Request</h1>
<div class="w-10"></div> <!-- Placeholder for balance if no trailing icon -->
</header>
<main class="px-margin-mobile pt-stack-lg max-w-[1200px] mx-auto md:px-margin-desktop">
<!-- Header Section -->
<div class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-stack-sm">What type of service do you have?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">This determines your priority and service charges</p>
</div>
<!-- Service Options Grid/Stack -->
<div class="flex flex-col gap-stack-lg">
<!-- Card 1: P1 AMC -->
<button class="text-left w-full relative overflow-hidden rounded-xl shadow-md border border-transparent hover:border-tertiary-container transition-all group p-[2px] bg-gradient-to-br from-[#7B2FBE] to-tertiary-container">
<div class="bg-on-primary h-full w-full rounded-[10px] p-stack-lg relative z-10 flex flex-col gap-stack-md">
<div class="flex justify-between items-start">
<span class="bg-[#7B2FBE]/10 text-[#7B2FBE] font-label-md text-label-md px-2 py-1 rounded-full uppercase tracking-wider font-bold">P1 — HIGHEST PRIORITY</span>
<span class="material-symbols-outlined text-[#7B2FBE] text-3xl fill-icon" data-icon="shield">shield</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">AMC — Annual Maintenance Contract</h3>
<p class="font-body-md text-body-md text-on-surface-variant">You have an active AMC on your registered equipment. This guarantees priority response times and covered routine maintenance.</p>
</div>
<div class="flex flex-wrap gap-2 mt-2">
<span class="bg-surface-container-low text-on-surface-variant font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline-variant/30"><span class="material-symbols-outlined text-[16px] fill-icon text-[#7B2FBE]">check_circle</span> 24hr SLA</span>
<span class="bg-surface-container-low text-on-surface-variant font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline-variant/30"><span class="material-symbols-outlined text-[16px] fill-icon text-[#7B2FBE]">check_circle</span> Zero Callout Fee</span>
<span class="bg-surface-container-low text-on-surface-variant font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline-variant/30"><span class="material-symbols-outlined text-[16px] fill-icon text-[#7B2FBE]">check_circle</span> Parts Covered</span>
</div>
<div class="mt-2 w-full flex items-center justify-center font-label-lg text-label-lg h-[52px] rounded-lg border-2 border-[#7B2FBE] text-[#7B2FBE] group-hover:bg-[#7B2FBE] group-hover:text-on-primary transition-colors">
                        Check AMC Status <span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
</div>
</div>
</button>
<!-- Card 2: P2 Warranty -->
<button class="text-left w-full relative overflow-hidden rounded-xl shadow-md border border-transparent hover:border-secondary transition-all group p-[2px] bg-gradient-to-br from-[#0099CC] to-secondary">
<div class="bg-on-primary h-full w-full rounded-[10px] p-stack-lg relative z-10 flex flex-col gap-stack-md">
<div class="flex justify-between items-start">
<span class="bg-[#0099CC]/10 text-[#0099CC] font-label-md text-label-md px-2 py-1 rounded-full uppercase tracking-wider font-bold">P2 — WARRANTY COVERED</span>
<span class="material-symbols-outlined text-[#0099CC] text-3xl fill-icon" data-icon="workspace_premium">workspace_premium</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Under Warranty</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Your AC is within manufacturer warranty. Repairs for manufacturing defects are covered, though external damage may not be.</p>
</div>
<div class="flex flex-wrap gap-2 mt-2">
<span class="bg-surface-container-low text-on-surface-variant font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline-variant/30"><span class="material-symbols-outlined text-[16px] fill-icon text-[#0099CC]">check_circle</span> Standard SLA</span>
<span class="bg-surface-container-low text-on-surface-variant font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline-variant/30"><span class="material-symbols-outlined text-[16px] fill-icon text-[#0099CC]">check_circle</span> Free Labor</span>
<span class="bg-surface-container-low text-on-surface-variant font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline-variant/30"><span class="material-symbols-outlined text-[16px] fill-icon text-[#0099CC]">check_circle</span> Defect Covered</span>
</div>
<div class="mt-2 w-full flex items-center justify-center font-label-lg text-label-lg h-[52px] rounded-lg border-2 border-[#0099CC] text-[#0099CC] group-hover:bg-[#0099CC] group-hover:text-on-primary transition-colors">
                        Check Warranty <span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
</div>
</div>
</button>
<!-- Card 3: P3 Paid -->
<button class="text-left w-full relative overflow-hidden rounded-xl shadow-sm border border-[#E63946]/30 hover:border-[#E63946] transition-all group p-[2px] bg-primary">
<div class="bg-primary h-full w-full rounded-[10px] p-stack-lg relative z-10 flex flex-col gap-stack-md">
<div class="flex justify-between items-start">
<span class="bg-[#E63946]/20 text-[#E63946] font-label-md text-label-md px-2 py-1 rounded-full uppercase tracking-wider font-bold">P3 — PAID SERVICE</span>
<span class="material-symbols-outlined text-[#E63946] text-3xl fill-icon" data-icon="build">build</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-primary mb-1">Paid Service / Out of Warranty</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-inverse-primary/80">Service charges apply for inspection and repair. You will receive a quote before any major work is undertaken.</p>
</div>
<div class="flex flex-wrap gap-2 mt-2">
<span class="bg-inverse-surface text-on-primary font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline/30"><span class="material-symbols-outlined text-[16px] fill-icon text-outline-variant">info</span> Estimate Provided</span>
<span class="bg-inverse-surface text-on-primary font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline/30"><span class="material-symbols-outlined text-[16px] fill-icon text-outline-variant">info</span> Standard Rates</span>
<span class="bg-inverse-surface text-on-primary font-label-md text-label-md px-3 py-1.5 rounded-full flex items-center gap-1 border border-outline/30"><span class="material-symbols-outlined text-[16px] fill-icon text-outline-variant">info</span> Pay on Completion</span>
</div>
<div class="mt-2 w-full flex items-center justify-center font-label-lg text-label-lg h-[52px] rounded-lg border-2 border-[#E63946] text-[#E63946] group-hover:bg-[#E63946] group-hover:text-on-primary transition-colors">
                        View Service Charges <span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
</div>
</div>
</button>
</div>
<div class="mt-stack-lg text-center pb-stack-lg">
<p class="font-body-md text-body-md text-outline">Not sure? Our team will verify your contract status upon assignment.</p>
</div>
</main>
<!-- BottomNavBar (Hidden on md, visible on small screens) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface dark:bg-on-surface px-margin-mobile pb-safe h-[72px] border-t border-outline-variant dark:border-outline shadow-md">

<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim font-bold hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-all p-2 rounded-lg w-16 scale-90 duration-150 opacity-80" href="#">
<span class="material-symbols-outlined mb-1 fill-icon" data-icon="build">build</span>
<span class="font-label-md text-label-md">Services</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-all p-2 rounded-lg w-16" href="#">
<span class="material-symbols-outlined mb-1" data-icon="confirmation_number">confirmation_number</span>
<span class="font-label-md text-label-md text-center leading-tight">My Tickets</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-all p-2 rounded-lg w-16" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-md text-label-md">Account</span>
</a>
</nav>
</body></html>
